<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Skill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 1. Ember (Default) */
            --color-bg: 24 18 16;
            --color-fg: 243 224 204;
            --color-border: 255 128 74;
            --border-opacity: 0.28;
            --font-primary: 'Newsreader', serif;
            --font-secondary: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --img-blend: screen;
            --img-invert: 0.2;
            --img-opacity: 0.72;
        }
        [data-theme="brutalist"] {
            /* 2. Brutalist */
            --color-bg: 255 255 255;
            --color-fg: 0 0 0;
            --color-border: 0 0 0;
            --border-opacity: 1; /* Solid borders */
            --font-primary: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: luminosity;
            --img-invert: 0;
            --img-opacity: 1;
        }
        [data-theme="sepia"] {
            /* 3. Sepia */
            --color-bg: 244 236 222;
            --color-fg: 67 52 34;
            --color-border: 67 52 34;
            --border-opacity: 0.2;
            --font-primary: 'Newsreader', serif;
            --font-secondary: 'Newsreader', serif;
            --img-blend: multiply;
            --img-invert: 0;
            --img-opacity: 0.85;
        }
        [data-theme="midnight"] {
            /* 4. Midnight */
            --color-bg: 0 0 0;
            --color-fg: 255 255 255;
            --color-border: 255 255 255;
            --border-opacity: 0.15;
            --font-primary: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.7;
        }
        [data-theme="terminal"] {
            /* 5. Terminal */
            --color-bg: 10 10 10;
            --color-fg: 0 255 65;
            --color-border: 0 255 65;
            --border-opacity: 0.3;
            --font-primary: 'JetBrains Mono', monospace;
            --font-secondary: 'JetBrains Mono', monospace;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.4;
        }
        [data-theme="blueprint"] {
            /* 6. Blueprint */
            --color-bg: 10 25 47;
            --color-fg: 100 255 218;
            --color-border: 100 255 218;
            --border-opacity: 0.2;
            --font-primary: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.3;
        }
        [data-theme="hacker"] {
            /* 7. Hacker / Cyberpunk */
            --color-bg: 9 4 14;
            --color-fg: 255 0 128;
            --color-border: 255 0 128;
            --border-opacity: 0.4;
            --font-primary: 'JetBrains Mono', monospace;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.6;
        }
        [data-theme="signal"] {
            --color-bg: 242 236 229;
            --color-fg: 31 28 26;
            --color-border: 173 81 47;
            --border-opacity: 0.22;
            --font-primary: 'Space Grotesk', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --img-blend: multiply;
            --img-invert: 0;
            --img-opacity: 0.86;
        }
        [data-theme="ember"] {
            --color-bg: 24 18 16;
            --color-fg: 243 224 204;
            --color-border: 255 128 74;
            --border-opacity: 0.28;
            --font-primary: 'Newsreader', serif;
            --font-secondary: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --img-blend: screen;
            --img-invert: 0.2;
            --img-opacity: 0.72;
        }
        body {
            background-color: rgb(var(--color-bg));
            color: rgb(var(--color-fg));
            font-family: var(--font-secondary);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }
        ::selection { background-color: rgb(var(--color-fg)); color: rgb(var(--color-bg)); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgb(var(--color-bg)); border-left: 1px solid rgba(var(--color-border), var(--border-opacity)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--color-fg)); }
        .theme-image {
            mix-blend-mode: var(--img-blend);
            filter: grayscale(100%) invert(var(--img-invert));
            opacity: var(--img-opacity);
            transition: all 0.5s ease;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .image-frame::after {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(var(--color-border), calc(var(--border-opacity) + 0.08));
            pointer-events: none;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: 'rgb(var(--color-bg) / <alpha-value>)',
                        fg: 'rgb(var(--color-fg) / <alpha-value>)',
                        border: 'rgba(var(--color-border), var(--border-opacity))',
                    },
                    fontFamily: {
                        primary: 'var(--font-primary)',
                        secondary: 'var(--font-secondary)',
                        mono: 'var(--font-mono)',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, AnimatePresence } = window.Motion;

        // --- Icons ---
        const TerminalIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>;
        const GithubIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;

        // --- Animations ---
        const fadeUp = { hidden: { opacity: 0, y: 30, filter: 'blur(10px)' }, visible: { opacity: 1, y: 0, filter: 'blur(0px)', transition: { duration: 0.8, ease: [0.16, 1, 0.3, 1] } } };
        const staggerContainer = { hidden: { opacity: 0 }, visible: { opacity: 1, transition: { staggerChildren: 0.1 } } };
        const textReveal = {
            hidden: { opacity: 0, y: 22, filter: 'blur(10px)' },
            visible: (delay = 0) => ({
                opacity: 1,
                y: 0,
                filter: 'blur(0px)',
                transition: { duration: 0.82, delay, ease: [0.16, 1, 0.3, 1] }
            })
        };
        const frameReveal = {
            hidden: { opacity: 0, y: 36, scale: 0.985 },
            visible: (delay = 0) => ({
                opacity: 1,
                y: 0,
                scale: 1,
                transition: { duration: 0.9, delay, ease: [0.16, 1, 0.3, 1] }
            })
        };
        const Reveal = ({ as = 'div', className = '', delay = 0, children, once = true }) => {
            const Tag = motion[as] || motion.div;
            return (
                <Tag
                    className={className}
                    custom={delay}
                    variants={textReveal}
                    initial="hidden"
                    whileInView="visible"
                    viewport={{ once, amount: 0.35 }}
                >
                    {children}
                </Tag>
            );
        };

        const imagery = {
            heroMain: "/assets/generated/hero-main.svg",
            heroDetail: "/assets/generated/hero-detail.svg",
            processOne: "/assets/generated/process-structure.svg",
            processTwo: "/assets/generated/process-variation.svg",
            processThree: "/assets/generated/process-review.svg",
            projectOne: "/assets/generated/project-atlas.svg",
            projectTwo: "/assets/generated/project-lattice.svg",
            projectThree: "/assets/generated/project-signal.svg"
        };

        // --- Layout Shell ---
        const sectionLinks = [
            { id: 'system', label: 'System' },
            { id: 'stack', label: 'Stack' },
            { id: 'prompts', label: 'Prompts' },
            { id: 'range', label: 'Range' },
            { id: 'projects', label: 'Projects' },
            { id: 'install', label: 'Install' },
            { id: 'faq', label: 'FAQ' },
        ];

        const Nav = ({ scrollToSection }) => (
            <motion.nav initial={{ y: -100 }} animate={{ y: 0 }} transition={{ duration: 0.8 }} className="flex items-center justify-between px-6 py-4 border-b border-border sticky top-0 bg-bg/90 backdrop-blur-md z-50">
                <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="flex items-center gap-2 group">
                    <div className="w-4 h-4 bg-fg rounded-sm group-hover:scale-90 transition-transform"></div>
                    <span className="font-primary text-xl tracking-tight font-medium">Design Skill</span>
                </button>
                <div className="flex items-center gap-6 text-sm font-medium hide-scroll overflow-x-auto">
                    {sectionLinks.map(section => (
                        <button key={section.id} onClick={() => scrollToSection(section.id)} className="hover:opacity-60 transition-opacity whitespace-nowrap">
                            {section.label}
                        </button>
                    ))}
                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="hidden lg:flex hover:opacity-60 transition-opacity items-center gap-2"><GithubIcon /> GitHub</a>
                </div>
            </motion.nav>
        );

        const ThemeToggle = ({ theme, setTheme }) => {
            const themes = ['paper', 'brutalist', 'sepia', 'midnight', 'terminal', 'blueprint', 'hacker', 'signal', 'ember'];
            
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key.toLowerCase() === 'c') cycleTheme(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [theme]);
            
            const cycleTheme = () => setTheme(themes[(themes.indexOf(theme) + 1) % themes.length]);
            
            return (
                <motion.button 
                    initial={{ scale: 0, opacity: 0 }} 
                    animate={{ scale: 1, opacity: 1 }} 
                    whileHover={{ scale: 1.05 }} 
                    whileTap={{ scale: 0.95 }} 
                    onClick={cycleTheme} 
                    className="fixed bottom-6 right-6 z-50 bg-fg text-bg pl-5 pr-4 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-colors duration-300 group"
                >
                    <span className="font-mono text-xs uppercase tracking-widest font-bold">Theme</span>
                    <div className="flex items-center justify-center w-6 h-6 rounded bg-bg text-fg font-mono text-[11px] font-bold border border-fg/20 shadow-inner group-hover:bg-fg group-hover:text-bg group-hover:border-bg/20 transition-colors">
                        C
                    </div>
                </motion.button>
            );
        };

        const Footer = () => (
            <footer className="p-8 md:p-16 max-w-[1400px] mx-auto w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-8 bg-bg">
                <div>
                    <div className="font-primary text-2xl tracking-tight mb-2">Design Skill</div>
                    <p className="font-mono text-xs text-fg/50 uppercase tracking-widest">A skill by arjunkshah.</p>
                </div>
                <div className="flex gap-8 text-sm font-medium">
                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="hover:underline underline-offset-4 flex items-center gap-2"><GithubIcon /> Repository</a>
                    <a href="https://github.com/arjunkshah/design-skill/issues" target="_blank" className="hover:underline underline-offset-4">Issues</a>
                    <a href="https://github.com/arjunkshah/design-skill/blob/main/LICENSE" target="_blank" className="hover:underline underline-offset-4">License</a>
                </div>
            </footer>
        );

        // ==========================================
        // HOME PAGE SECTIONS (11 Sections Total)
        // ==========================================

        // Section 1: Hero
        const Hero = () => {
            const { scrollY } = useScroll();
            const y1 = useTransform(scrollY, [0, 1000], [0, 140]);
            const y2 = useTransform(scrollY, [0, 1000], [0, -60]);
            const opacity = useTransform(scrollY, [0, 420], [1, 0]);

            return (
                <header id="top" className="border-b border-border relative overflow-hidden">
                    <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12 min-h-[85vh]">
                        <div className="md:col-span-8 p-8 md:p-16 border-r border-border flex flex-col justify-center relative z-10 bg-bg">
                            <motion.div variants={staggerContainer} initial="hidden" animate="visible">
                                <motion.span variants={fadeUp} className="font-mono text-xs tracking-[0.2em] uppercase text-fg/50 mb-8 block">v1.0.0 / Open-Source Skill</motion.span>
                                <motion.h1 variants={fadeUp} className="font-primary text-[11vw] md:text-[8vw] leading-[0.85] tracking-[-0.04em] text-fg mb-8">
                                    Structure<br/>before code.
                                </motion.h1>
                                <motion.p variants={fadeUp} className="text-xl md:text-2xl font-primary text-fg/60 max-w-2xl leading-relaxed">
                                    An open-source design skill for coding agents. It fixes a recurring failure mode: functional code with weak, repetitive layout judgment.
                                </motion.p>
                                <motion.div variants={fadeUp} className="mt-12 flex flex-wrap items-center gap-4">
                                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="bg-fg text-bg px-6 py-4 text-sm font-medium rounded-sm flex items-center gap-2 hover:opacity-80 transition-opacity">
                                        <GithubIcon /> View Repository
                                    </a>
                                    <div className="px-6 py-4 text-sm font-mono border border-border rounded-sm bg-fg/5 flex items-center gap-2">
                                        <span className="text-fg/50">$</span> design-skill
                                    </div>
                                </motion.div>
                                <motion.div variants={fadeUp} className="mt-12 grid grid-cols-1 md:grid-cols-3 gap-[1px] bg-border border border-border">
                                    {[
                                        ['layout archetypes', 'editorial split, bento, pinned stages'],
                                        ['motion profiles', 'quiet reveals, sticky story, rhythm shifts'],
                                        ['skill stack', '$design-skill + $animation-director']
                                    ].map(([label, value]) => (
                                        <div key={label} className="bg-bg px-5 py-5">
                                            <div className="font-mono text-[10px] uppercase tracking-[0.24em] text-fg/45 mb-2">{label}</div>
                                            <div className="text-sm text-fg/75 leading-relaxed">{value}</div>
                                        </div>
                                    ))}
                                </motion.div>
                            </motion.div>
                        </div>
                        <div className="md:col-span-4 flex flex-col justify-between relative bg-fg/5 overflow-hidden">
                            <motion.div style={{ y: y1, opacity }} className="absolute inset-x-10 top-12 z-0 image-frame border border-border bg-bg overflow-hidden shadow-2xl">
                                <img src={imagery.heroMain} alt="Editorial workspace" className="w-full aspect-[4/5] object-cover theme-image" />
                            </motion.div>
                            <motion.div style={{ y: y2, opacity }} className="absolute right-8 bottom-24 z-10 image-frame w-[48%] border border-border bg-bg overflow-hidden shadow-xl">
                                <img src={imagery.heroDetail} alt="Structured interior detail" className="w-full aspect-[4/5] object-cover theme-image" />
                            </motion.div>
                            <div className="p-8 md:p-16 z-20 mt-auto bg-gradient-to-t from-bg via-bg/88 to-transparent">
                                <Reveal as="h3" className="font-mono text-xs tracking-widest uppercase mb-4 border-b border-border pb-4">The Failure Mode</Reveal>
                                <Reveal as="p" delay={0.08} className="text-sm text-fg/70 leading-relaxed">
                                    The model reaches for the same centered hero, the same repeated feature cards, and the same cramped mobile collapse.
                                </Reveal>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        // Section 2: Code Comparison
        const CodeComparison = () => (
            <section className="border-b border-border bg-fg/5">
                <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-2">
                    <div className="p-8 md:p-16 border-r border-border bg-bg">
                        <h3 className="font-mono text-xs tracking-widest uppercase mb-6 text-fg/50">Standard AI Output</h3>
                        <div className="font-mono text-sm leading-relaxed text-fg/70 bg-fg/5 p-6 border border-border rounded-sm">
                            <span className="text-red-500">-</span> &lt;div className="flex flex-col items-center text-center p-8 bg-white rounded-xl shadow-lg"&gt;<br/>
                            <span className="text-red-500">-</span> &nbsp;&nbsp;&lt;h1 className="text-4xl font-bold text-gray-900"&gt;Welcome&lt;/h1&gt;<br/>
                            <span className="text-red-500">-</span> &nbsp;&nbsp;&lt;p className="text-gray-500 mt-4"&gt;Generic subtitle here&lt;/p&gt;<br/>
                            <span className="text-red-500">-</span> &lt;/div&gt;
                        </div>
                        <p className="mt-6 text-sm font-primary italic text-fg/60">Result: "AI Slop". Arbitrary padding, generic shadows, lacking materiality.</p>
                    </div>
                    <div className="p-8 md:p-16 bg-bg">
                        <h3 className="font-mono text-xs tracking-widest uppercase mb-6 text-fg/50 flex items-center gap-2"><TerminalIcon/> Design Skill Output</h3>
                        <div className="font-mono text-sm leading-relaxed text-fg/90 bg-fg/10 p-6 border border-border rounded-sm shadow-inner">
                            <span className="text-green-500">+</span> &lt;section className="grid grid-cols-12 border-b border-black/10"&gt;<br/>
                            <span className="text-green-500">+</span> &nbsp;&nbsp;&lt;div className="col-span-8 border-r border-black/10 p-16"&gt;<br/>
                            <span className="text-green-500">+</span> &nbsp;&nbsp;&nbsp;&nbsp;&lt;h1 className="text-[8vw] font-serif leading-none tracking-tight"&gt;...&lt;/h1&gt;<br/>
                            <span className="text-green-500">+</span> &nbsp;&nbsp;&lt;/div&gt;<br/>
                            <span className="text-green-500">+</span> &lt;/section&gt;
                        </div>
                        <p className="mt-6 text-sm font-primary italic text-fg/60">Result: Structural, grid-aligned, materiality-focused composition.</p>
                    </div>
                </div>
            </section>
        );

        // Section 3: Infinite Marquee
        const Marquee = () => (
            <div className="flex overflow-hidden bg-fg text-bg py-4 border-b border-border whitespace-nowrap">
                <motion.div animate={{ x: ["0%", "-50%"] }} transition={{ repeat: Infinity, ease: "linear", duration: 25 }} className="flex font-mono text-sm uppercase tracking-[0.2em]">
                    <span className="px-8">DETERMINISTIC LAYOUTS</span><span className="px-8">—</span>
                    <span className="px-8">STRUCTURAL INTEGRITY</span><span className="px-8">—</span>
                    <span className="px-8">END TO AI SLOP</span><span className="px-8">—</span>
                    <span className="px-8">DETERMINISTIC LAYOUTS</span><span className="px-8">—</span>
                    <span className="px-8">STRUCTURAL INTEGRITY</span><span className="px-8">—</span>
                    <span className="px-8">END TO AI SLOP</span><span className="px-8">—</span>
                </motion.div>
            </div>
        );

        // Section 4: The Philosophy
        const Philosophy = () => (
            <section className="border-b border-border bg-bg py-24 md:py-48 px-8">
                <div className="max-w-[1200px] mx-auto text-center">
                    <Reveal as="h2" className="font-primary text-4xl md:text-6xl lg:text-7xl leading-[1.1] tracking-tight text-fg">
                        Design is not decoration.<br/>It is the structural division<br/>of space.
                    </Reveal>
                </div>
            </section>
        );

        // Section 5: Architecture
        const Architecture = () => {
            const steps = [
                ["01. Intercept", "Prompt Parsing", "The agent reads the brief, activates `$design-skill`, and chooses a layout archetype before placing components."],
                ["02. Inject", "System Injection", "Archetypes, variation axes, component families, and scroll patterns are pulled from the skill references before generation."],
                ["03. Generate", "Deterministic Output", "The agent outputs stronger layout rhythm, mobile reflow, and a review pass instead of a generic hero-and-cards default."]
            ];
            return (
            <section id="system" className="border-b border-border bg-bg">
                <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-3">
                    {steps.map(([kicker, title, body], idx) => (
                        <motion.div
                            key={title}
                            className={`p-8 md:p-16 ${idx < 2 ? 'border-b md:border-b-0 md:border-r' : ''} border-border hover:bg-fg/5 transition-colors`}
                            initial="hidden"
                            whileInView="visible"
                            viewport={{ once: true, amount: 0.3 }}
                            custom={idx * 0.08}
                            variants={frameReveal}
                        >
                            <Reveal as="span" className="font-mono text-xs tracking-widest uppercase text-fg/50 mb-4 block">{kicker}</Reveal>
                            <Reveal as="h3" delay={0.06} className="font-primary text-2xl mb-4">{title}</Reveal>
                            <Reveal as="p" delay={0.12} className="text-sm text-fg/70 leading-relaxed font-mono">{body}</Reveal>
                        </motion.div>
                    ))}
                </div>
            </section>
        );
        };

        // Section 6: Typography Scale
        const TypographyScale = () => (
            <section className="border-b border-border bg-bg overflow-hidden">
                <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12">
                    <div className="md:col-span-4 p-8 md:p-16 border-r border-border flex flex-col justify-center">
                        <Reveal as="h2" className="font-primary text-4xl tracking-tight mb-4">Modular Scale</Reveal>
                        <Reveal as="p" delay={0.08} className="text-fg/60 text-sm leading-relaxed">Design Skill bans arbitrary font sizes. The LLM is constrained to a perfect typographic ratio, ensuring rhythm across all viewports.</Reveal>
                    </div>
                    <div className="md:col-span-8 p-8 md:p-16 flex flex-col gap-8 justify-center bg-fg/5">
                        <div className="flex justify-between items-baseline border-b border-border pb-2">
                            <span className="font-primary text-[10vw] md:text-[6vw] leading-none tracking-tighter">Display</span>
                            <span className="font-mono text-xs text-fg/40">text-[8vw]</span>
                        </div>
