<!DOCTYPE html>
<!-- Marketing site for the Design Skill repo. Skill instructions live only in skills/design-skill/SKILL.md and skills/animation-director/SKILL.md. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Skill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 1. Ember (Default) */
            --color-bg: 24 18 16;
            --color-fg: 243 224 204;
            --color-border: 255 128 74;
            --border-opacity: 0.28;
            --font-primary: 'Newsreader', serif;
            --font-secondary: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --img-blend: screen;
            --img-invert: 0.2;
            --img-opacity: 0.72;
        }
        [data-theme="brutalist"] {
            /* 2. Brutalist */
            --color-bg: 255 255 255;
            --color-fg: 0 0 0;
            --color-border: 0 0 0;
            --border-opacity: 1; /* Solid borders */
            --font-primary: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: luminosity;
            --img-invert: 0;
            --img-opacity: 1;
        }
        [data-theme="sepia"] {
            /* 3. Sepia */
            --color-bg: 244 236 222;
            --color-fg: 67 52 34;
            --color-border: 67 52 34;
            --border-opacity: 0.2;
            --font-primary: 'Newsreader', serif;
            --font-secondary: 'Newsreader', serif;
            --img-blend: multiply;
            --img-invert: 0;
            --img-opacity: 0.85;
        }
        [data-theme="midnight"] {
            /* 4. Midnight */
            --color-bg: 0 0 0;
            --color-fg: 255 255 255;
            --color-border: 255 255 255;
            --border-opacity: 0.15;
            --font-primary: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.7;
        }
        [data-theme="terminal"] {
            /* 5. Terminal */
            --color-bg: 10 10 10;
            --color-fg: 0 255 65;
            --color-border: 0 255 65;
            --border-opacity: 0.3;
            --font-primary: 'JetBrains Mono', monospace;
            --font-secondary: 'JetBrains Mono', monospace;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.4;
        }
        [data-theme="blueprint"] {
            /* 6. Blueprint */
            --color-bg: 10 25 47;
            --color-fg: 100 255 218;
            --color-border: 100 255 218;
            --border-opacity: 0.2;
            --font-primary: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.3;
        }
        [data-theme="hacker"] {
            /* 7. Hacker / Cyberpunk */
            --color-bg: 9 4 14;
            --color-fg: 255 0 128;
            --color-border: 255 0 128;
            --border-opacity: 0.4;
            --font-primary: 'JetBrains Mono', monospace;
            --font-secondary: 'Inter', sans-serif;
            --img-blend: screen;
            --img-invert: 1;
            --img-opacity: 0.6;
        }
        [data-theme="signal"] {
            --color-bg: 242 236 229;
            --color-fg: 31 28 26;
            --color-border: 173 81 47;
            --border-opacity: 0.22;
            --font-primary: 'Space Grotesk', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --img-blend: multiply;
            --img-invert: 0;
            --img-opacity: 0.86;
        }
        [data-theme="ember"] {
            --color-bg: 24 18 16;
            --color-fg: 243 224 204;
            --color-border: 255 128 74;
            --border-opacity: 0.28;
            --font-primary: 'Newsreader', serif;
            --font-secondary: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --img-blend: screen;
            --img-invert: 0.2;
            --img-opacity: 0.72;
        }
        body {
            background-color: rgb(var(--color-bg));
            color: rgb(var(--color-fg));
            font-family: var(--font-secondary);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }
        ::selection { background-color: rgb(var(--color-fg)); color: rgb(var(--color-bg)); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgb(var(--color-bg)); border-left: 1px solid rgba(var(--color-border), var(--border-opacity)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--color-fg)); }
        .theme-image {
            mix-blend-mode: var(--img-blend);
            filter: grayscale(100%) invert(var(--img-invert));
            opacity: var(--img-opacity);
            transition: all 0.5s ease;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .image-frame::after {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(var(--color-border), calc(var(--border-opacity) + 0.08));
            pointer-events: none;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: 'rgb(var(--color-bg) / <alpha-value>)',
                        fg: 'rgb(var(--color-fg) / <alpha-value>)',
                        border: 'rgba(var(--color-border), var(--border-opacity))',
                    },
                    fontFamily: {
                        primary: 'var(--font-primary)',
                        secondary: 'var(--font-secondary)',
                        mono: 'var(--font-mono)',
                    }
                }
            }
        }
    </script>
</head>
<body>

        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, AnimatePresence } = window.Motion;

        // --- Icons ---

                    <path

                        fill={fill}

            codex: {
                type: 'wordmark',
                label: 'Codex',
                wordmark: 'codex',

            antigravity: {

            },
            opencode: {
                type: 'symbol',
                label: 'OpenCode',
                viewBox: '0 0 96 96',
                front: '#f7f6f2',
                side: '#a39d92',
                edge: '#4b4741',
                render: (fill, stroke) => (
                    <g>
                        <path d="M18 18h60v60H18zM34 30h28v36H34z" fill={fill} fillRule="evenodd" />

            windsurf: {
                type: 'symbol',
                label: 'Windsurf',
                viewBox: '0 0 1024 1024',
                front: '#11221d',
                side: '#5e7f74',
                edge: '#0b100f',
                render: (fill) => (
                    <path
                        d="M897.246 286.869H889.819C850.735 286.808 819.017 318.46 819.017 357.539V515.589C819.017 547.15 792.93 572.716 761.882 572.716C743.436 572.716 725.02 563.433 714.093 547.85L552.673 317.304C539.28 298.16 517.486 286.747 493.895 286.747C457.094 286.747 423.976 318.034 423.976 356.657V515.619C423.976 547.181 398.103 572.746 366.842 572.746C348.335 572.746 329.949 563.463 319.021 547.881L138.395 289.882C134.316 284.038 125.154 286.93 125.154 294.052V431.892C125.154 438.862 127.285 445.619 131.272 451.34L309.037 705.2C319.539 720.204 335.033 731.344 352.9 735.392C397.616 745.557 438.77 711.135 438.77 667.278V508.406C438.77 476.845 464.339 451.279 495.904 451.279H495.995C515.02 451.279 532.857 460.562 543.785 476.145L705.235 706.661C718.659 725.835 739.327 737.218 763.983 737.218C801.606 737.218 833.841 705.9 833.841 667.308V508.376C833.841 476.815 859.41 451.249 890.975 451.249H897.276C901.233 451.249 904.43 448.053 904.43 444.097V294.021C904.43 290.065 901.233 286.869 897.276 286.869H897.246Z"
                        fill={fill}
                    />
                )
            }
        };
        const ExtrudedSymbol = ({ config }) => {
            const layers = Array.from({ length: 7 }, (_, index) => 7 - index);
            return (
                <svg viewBox="0 0 220 220" className="w-32 h-32 md:w-36 md:h-36 overflow-visible drop-shadow-[0_24px_44px_rgba(0,0,0,0.2)]">
                    <ellipse cx="110" cy="184" rx="54" ry="16" fill="rgba(0,0,0,0.12)" />
                    {layers.map((depth) => (
                        <g key={depth} transform={`translate(${depth * 2.1} ${depth * 2.6})`}>
                            <svg x="30" y="26" width="136" height="136" viewBox={config.viewBox}>
                                {config.render(config.side, config.edge)}
                            </svg>
                        </g>
                    ))}
                    <svg x="30" y="26" width="136" height="136" viewBox={config.viewBox}>
                        {config.render(config.front, config.edge)}
                    </svg>
                </svg>
            );
        };
        const ExtrudedWordmark = ({ config }) => {
            const layers = Array.from({ length: 7 }, (_, index) => 7 - index);
            return (
                <svg viewBox="0 0 220 220" className="w-32 h-32 md:w-36 md:h-36 overflow-visible drop-shadow-[0_24px_44px_rgba(0,0,0,0.18)]">
                    <ellipse cx="110" cy="185" rx="58" ry="16" fill="rgba(0,0,0,0.11)" />
                    {layers.map((depth) => (
                        <g key={depth} transform={`translate(${depth * 2.05} ${depth * 2.55})`}>
                            <rect x="30" y="54" width="128" height="74" rx="22" fill={config.side} stroke={config.edge} strokeWidth="3" />
                        </g>
                    ))}
                    <rect x="30" y="54" width="128" height="74" rx="22" fill={config.front} stroke={config.edge} strokeWidth="3" />
                    <text x="94" y="99" textAnchor="middle" fontFamily="var(--font-mono)" fontSize="26" letterSpacing="3" fontWeight="700" fill={config.text}>
                        {config.wordmark}
                    </text>
                </svg>
            );
        };
        const HeroBrandObject = ({ logo }) => {
            const config = logoConfigs[logo];
            return config.type === 'wordmark'
                ? <ExtrudedWordmark config={config} />
                : <ExtrudedSymbol config={config} />;
        };

        // --- Animations ---
        const fadeUp = { hidden: { opacity: 0, y: 30, filter: 'blur(10px)' }, visible: { opacity: 1, y: 0, filter: 'blur(0px)', transition: { duration: 0.8, ease: [0.16, 1, 0.3, 1] } } };
        const staggerContainer = { hidden: { opacity: 0 }, visible: { opacity: 1, transition: { staggerChildren: 0.1 } } };
        const textReveal = {
            hidden: { opacity: 0, y: 22, filter: 'blur(10px)' },
            visible: (delay = 0) => ({
                opacity: 1,
                y: 0,
                filter: 'blur(0px)',
                transition: { duration: 0.82, delay, ease: [0.16, 1, 0.3, 1] }
            })
        };
        const frameReveal = {
            hidden: { opacity: 0, y: 36, scale: 0.985 },
            visible: (delay = 0) => ({
                opacity: 1,
                y: 0,
                scale: 1,
                transition: { duration: 0.9, delay, ease: [0.16, 1, 0.3, 1] }
            })
        };
        const Reveal = ({ as = 'div', className = '', delay = 0, children, once = true }) => {
            const Tag = motion[as] || motion.div;
            return (
                <Tag
                    className={className}
                    custom={delay}
                    variants={textReveal}
                    initial="hidden"
                    whileInView="visible"
                    viewport={{ once, amount: 0.35 }}
                >
                    {children}
                </Tag>
            );
        };

        const imagery = {
            heroMain: "/examples/screenshots/axon-home.png",
            heroDetail: "/examples/screenshots/ledger-home.png",
            processOne: "/examples/screenshots/axon-home.png",
            processTwo: "/examples/screenshots/ledger-home.png",
            processThree: "/examples/screenshots/canopy-home.png",
            projectOne: "/examples/screenshots/axon-home.png",
            projectTwo: "/examples/screenshots/ledger-home.png",
            projectThree: "/examples/screenshots/canopy-home.png"
        };

        // --- Layout Shell ---
        const sectionLinks = [
            { id: 'system', label: 'System' },
            { id: 'stack', label: 'Stack' },
            { id: 'prompts', label: 'Prompts' },
            { id: 'range', label: 'Range' },
            { id: 'projects', label: 'Projects' },
            { id: 'install', label: 'Install' },
            { id: 'faq', label: 'FAQ' },
        ];

        const Nav = ({ scrollToSection }) => (
            <motion.nav initial={{ y: -100 }} animate={{ y: 0 }} transition={{ duration: 0.8 }} className="flex items-center justify-between px-6 py-4 border-b border-border sticky top-0 bg-bg/90 backdrop-blur-md z-50">
                <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="flex items-center gap-2 group">
                    <div className="w-4 h-4 bg-fg rounded-sm group-hover:scale-90 transition-transform"></div>
                    <span className="font-primary text-xl tracking-tight font-medium">Design Skill</span>
                </button>
                <div className="flex items-center gap-6 text-sm font-medium hide-scroll overflow-x-auto">
                    {sectionLinks.map(section => (
                        <button key={section.id} onClick={() => scrollToSection(section.id)} className="hover:opacity-60 transition-opacity whitespace-nowrap">
                            {section.label}
                        </button>
                    ))}
                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="hidden lg:flex hover:opacity-60 transition-opacity items-center gap-2"><GithubIcon /> GitHub</a>
                </div>
            </motion.nav>
        );

        const ThemeToggle = ({ theme, setTheme }) => {
            const themes = ['paper', 'brutalist', 'sepia', 'midnight', 'terminal', 'blueprint', 'hacker', 'signal', 'ember'];
            
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key.toLowerCase() === 'c') cycleTheme(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [theme]);
            
            const cycleTheme = () => setTheme(themes[(themes.indexOf(theme) + 1) % themes.length]);
            
            return (
                <motion.button 
                    initial={{ scale: 0, opacity: 0 }} 
                    animate={{ scale: 1, opacity: 1 }} 
                    whileHover={{ scale: 1.05 }} 
                    whileTap={{ scale: 0.95 }} 
                    onClick={cycleTheme} 
                    className="fixed bottom-6 right-6 z-50 bg-fg text-bg pl-5 pr-4 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-colors duration-300 group"
                >
                    <span className="font-mono text-xs uppercase tracking-widest font-bold">Theme</span>
                    <div className="flex items-center justify-center w-6 h-6 rounded bg-bg text-fg font-mono text-[11px] font-bold border border-fg/20 shadow-inner group-hover:bg-fg group-hover:text-bg group-hover:border-bg/20 transition-colors">
                        C
                    </div>
                </motion.button>
            );
        };

        const Footer = () => (
            <footer className="p-8 md:p-16 max-w-[1400px] mx-auto w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-8 bg-bg">
                <div>
                    <div className="font-primary text-2xl tracking-tight mb-2">Design Skill</div>
                    <p className="font-mono text-xs text-fg/50 uppercase tracking-widest">A skill by arjunkshah.</p>
                </div>
                <div className="flex gap-8 text-sm font-medium">
                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="hover:underline underline-offset-4 flex items-center gap-2"><GithubIcon /> Repository</a>
                    <a href="https://github.com/arjunkshah/design-skill/issues" target="_blank" className="hover:underline underline-offset-4">Issues</a>
                    <a href="https://github.com/arjunkshah/design-skill/blob/main/LICENSE" target="_blank" className="hover:underline underline-offset-4">License</a>
                </div>
            </footer>
        );

        // ==========================================
        // HOME PAGE SECTIONS (11 Sections Total)
        // ==========================================

        // Section 1: Hero
        const Hero = () => {
            const integrationsLeft = [
                { name: "Claude Code", logo: "claude", x: 8, y: 10, rotate: -18, scale: 1.06 },
                { name: "Cursor", logo: "cursor", x: 28, y: 31, rotate: -8, scale: 0.98 },
                { name: "Codex", logo: "codex", x: 46, y: 54, rotate: 8, scale: 0.96 }
            ];
            const integrationsRight = [
                { name: "Antigravity", logo: "antigravity", x: 46, y: 11, rotate: 18, scale: 1.05 },
                { name: "OpenCode", logo: "opencode", x: 26, y: 32, rotate: 9, scale: 1.0 },
                { name: "Windsurf", logo: "windsurf", x: 8, y: 55, rotate: -10, scale: 0.98 }
            ];

            return (
                <header id="top" className="border-b border-border relative overflow-hidden">
                    <div className="max-w-[1480px] mx-auto min-h-[88vh] px-6 md:px-12 py-8 md:py-12 flex items-center justify-center relative">
                        <div className="hidden xl:block absolute left-0 top-0 bottom-0 w-[24rem] pointer-events-none z-10">
                            {integrationsLeft.map((tool, index) => (
                                <motion.div
                                    key={tool.name}
                                    initial={{ opacity: 0, x: -28, y: 18, scale: 0.92 }}
                                    animate={{ opacity: 1, x: 0, y: [0, -10, 0], scale: tool.scale }}
                                    transition={{ opacity: { duration: 0.5, delay: 0.12 * index }, x: { duration: 0.6, delay: 0.12 * index }, scale: { duration: 0.6, delay: 0.12 * index }, y: { duration: 5.2 + index, repeat: Infinity, ease: "easeInOut" } }}
                                    className="absolute"
                                    style={{ left: `${tool.x}%`, top: `${tool.y}%`, rotate: `${tool.rotate}deg` }}
                                >
                                    <div className="flex flex-col items-center">
                                        <HeroBrandObject logo={tool.logo} />
                                        <div className="mt-2 text-center">
                                            <div className="font-secondary text-sm text-fg/88">{tool.name}</div>
                                        </div>
                                    </div>
                                </motion.div>
                            ))}
                        </div>

                        <div className="w-full max-w-[980px] relative z-20 text-center">
                            <motion.div variants={staggerContainer} initial="hidden" animate="visible">
                                <motion.span variants={fadeUp} className="font-mono text-xs tracking-[0.22em] uppercase text-fg/50 mb-8 block">v1.0.0 / Open-Source Skill</motion.span>
                                <motion.h1 variants={fadeUp} className="font-primary text-[16vw] sm:text-[13vw] md:text-[9vw] leading-[0.82] tracking-[-0.05em] text-fg mb-8">
                                    Structure<br/>before code.
                                </motion.h1>
                                <motion.p variants={fadeUp} className="text-lg md:text-2xl font-primary text-fg/60 max-w-3xl mx-auto leading-relaxed">
                                    An open-source design skill for coding agents. It fixes a recurring failure mode: functional code with weak, repetitive layout judgment.
                                </motion.p>
                                <motion.div variants={fadeUp} className="mt-12 flex flex-wrap items-center justify-center gap-4">
                                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="bg-fg text-bg px-6 py-4 text-sm font-medium rounded-sm flex items-center gap-2 hover:opacity-80 transition-opacity">

                                        <div className="absolute left-4 top-4 bg-bg/90 border border-border px-3 py-2 font-mono text-[10px] uppercase tracking-[0.18em]">repo example</div>
                                    </div>
                                    <Reveal as="h3" className="font-secondary text-lg mb-2">{project.title}</Reveal>
                                    <Reveal as="p" delay={0.06} className="text-sm text-fg/65 leading-relaxed">{project.note}</Reveal>
                                    <a href={project.href} className="inline-flex mt-5 border border-border bg-fg/5 px-4 py-3 font-mono text-xs uppercase tracking-[0.18em] hover:bg-fg/10 transition-colors">Open Example</a>
                                </motion.article>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // Section 10: Testimonials
        const Testimonials = () => {
            const quotes = [
                { text: "Finally, an AI that doesn't use box-shadow: 0 4px 6px rgba(0,0,0,0.1) on literally every div.", author: "Frontend Lead" },
                { text: "It feels like having a senior designer sitting next to Claude, slapping its hand when it reaches for a generic gradient.", author: "Indie Hacker" },
                { text: "Splitting layout and animation into separate skills makes the output feel much more intentional and less chaotic.", author: "Design Engineer" }
            ];
            return (
                <section className="border-b border-border bg-bg">
                    <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-3">
                        {quotes.map((q, i) => (
                            <motion.div key={i} className="p-8 md:p-16 border-b md:border-b-0 md:border-r border-border last:border-r-0 flex flex-col justify-between min-h-[300px] hover:bg-fg/5 transition-colors" initial="hidden" whileInView="visible" viewport={{ once: true, amount: 0.25 }} custom={i * 0.08} variants={frameReveal}>
                                <Reveal as="p" className="font-primary text-xl md:text-2xl leading-relaxed text-fg/90 mb-8">"{q.text}"</Reveal>
                                <Reveal as="span" delay={0.08} className="font-mono text-xs uppercase tracking-widest text-fg/50">— {q.author}</Reveal>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        // Section 11: FAQ
        const FAQ = () => {
            const faqs = [
                { q: "Does it work with standard frontend stacks?", a: "Yes. The skill outputs normal frontend code, but it pushes the agent toward stronger spacing systems, hierarchy, and section rhythm instead of arbitrary utility spam." },
                { q: "Can I customize the system?", a: "Yes. Edit skills/design-skill/SKILL.md directly. The design skill is now just the Jasmine prompt, so customization happens in one place." },
                { q: "How do I install it?", a: "Run npx skills add https://github.com/arjunkshah/design-skill, then invoke $design-skill by itself or pair it with $animation-director when the page needs a full motion layer." },
            ];
            const [open, setOpen] = useState(0);

            return (
                <section id="faq" className="border-b border-border bg-bg">
                    <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12">
                        <div className="md:col-span-4 p-8 md:p-16 border-r border-border">
                            <Reveal as="h2" className="font-primary text-4xl tracking-tight mb-4">Index</Reveal>
                            <Reveal as="p" delay={0.08} className="font-mono text-xs uppercase tracking-widest text-fg/50">Frequently Asked Questions</Reveal>
                        </div>
                        <div className="md:col-span-8 flex flex-col">
                            {faqs.map((faq, i) => (
                                <div key={i} className="border-b border-border last:border-b-0">
                                    <button onClick={() => setOpen(open === i ? -1 : i)} className="w-full p-8 md:p-12 flex justify-between items-center text-left hover:bg-fg/5 transition-colors">
                                        <Reveal as="h3" className="font-primary text-2xl">{faq.q}</Reveal>
                                        <motion.div animate={{ rotate: open === i ? 45 : 0 }}><PlusIcon /></motion.div>
                                    </button>
                                    <AnimatePresence>
                                        {open === i && (
                                            <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden">
                                                <div className="px-8 md:px-12 pb-12 pt-0 text-fg/70 leading-relaxed max-w-2xl">{faq.a}</div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Install = () => (
            <section id="install" className="border-b border-border bg-bg">
                <div className="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12">
                    <div className="md:col-span-4 p-8 md:p-16 border-r border-border bg-fg/5">
                        <Reveal as="h2" className="font-primary text-4xl tracking-tight mb-4">Install</Reveal>
                        <Reveal as="p" delay={0.08} className="text-sm text-fg/65 leading-relaxed">
                            Add the repo as a skill source once, then invoke layout by itself or pair it with the motion layer when the page needs full frontend direction.
                        </Reveal>
                    </div>
                    <div className="md:col-span-8 p-8 md:p-16 space-y-10">
                        <div>
                            <Reveal as="div" className="font-mono text-xs tracking-widest uppercase text-fg/50 mb-4">Step 1</Reveal>
                            <div className="border border-border bg-fg/5 p-5 font-mono text-sm overflow-x-auto">
                                npx skills add https://github.com/arjunkshah/design-skill
                            </div>
                        </div>
                        <div>
                            <Reveal as="div" className="font-mono text-xs tracking-widest uppercase text-fg/50 mb-4">Step 2</Reveal>
                            <div className="border border-border bg-fg/5 p-5 font-mono text-sm">
                                $design-skill
                            </div>
                        </div>
                        <div>
                            <Reveal as="div" className="font-mono text-xs tracking-widest uppercase text-fg/50 mb-4">Step 3</Reveal>
                            <div className="border border-border bg-fg/5 p-5 font-mono text-sm">
                                $design-skill $animation-director
                            </div>
                        </div>
                        <div>
                            <Reveal as="div" className="font-mono text-xs tracking-widest uppercase text-fg/50 mb-4">Step 4</Reveal>
                            <Reveal as="p" delay={0.08} className="text-sm text-fg/70 leading-relaxed max-w-2xl mb-4">
                                Prompt for the outcome, not a template. The layout skill picks structure and style direction, and the animation skill handles sequencing, interaction polish, and scroll behavior.
                            </Reveal>
                            <div className="border border-border bg-bg p-6 font-primary text-xl leading-relaxed italic">
                                "$design-skill $animation-director Design a landing page with a pinned demo stage, tighter editorial typography, a bento section that breaks symmetry, and restrained tactile motion."
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        // Section 12: Open Source Callout
        const OpenSourceCallout = () => (
            <section className="bg-fg text-bg overflow-hidden relative border-b border-border">
                <motion.div initial={{ opacity: 0 }} whileInView={{ opacity: 1 }} viewport={{ once: true }} className="max-w-[1400px] mx-auto p-8 md:p-16 py-24 md:py-48 flex flex-col items-center justify-center text-center relative z-10">
                    <Reveal as="span" className="font-mono text-sm tracking-[0.3em] uppercase opacity-50 mb-8 block">MIT Licensed</Reveal>
                    <a href="https://github.com/arjunkshah/design-skill" target="_blank" className="group block">
                        <Reveal as="h2" delay={0.08} className="font-primary text-[15vw] md:text-[12vw] leading-[0.8] tracking-tighter mb-8 group-hover:opacity-80 transition-opacity">Open<br/>Source.</Reveal>
                        <div className="flex items-center justify-center gap-4 opacity-70 group-hover:opacity-100 transition-opacity">
                            <GithubIcon />
                            <span className="font-mono text-sm md:text-base border-b border-bg/30 pb-1 group-hover:border-bg transition-colors">github.com/arjunkshah/design-skill</span>
                        </div>
                    </a>
                </motion.div>
                <div className="absolute top-0 left-1/4 w-[1px] h-full bg-bg/10"></div>
                <div className="absolute top-0 right-1/4 w-[1px] h-full bg-bg/10"></div>
                <div className="absolute top-1/2 left-0 w-full h-[1px] bg-bg/10"></div>
            </section>
        );

        // --- Main App ---
        const App = () => {
            const [theme, setTheme] = useState('ember');
            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            return (
                <div className="min-h-screen flex flex-col">
                    <Nav scrollToSection={scrollToSection} />
                    
                    <main className="flex-grow">
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                            <Hero />
                            <CodeComparison />
                            <Marquee />
                            <Philosophy />
                            <Architecture />
                            <TypographyScale />
                            <SkillStack />
                            <PromptLab />
                            <SpatialGrid />
                            <ScrollyTelling />
                            <BentoGrid />
                            <ProjectGallery />
                            <Testimonials />
                            <FAQ />
                            <Install />
                            <OpenSourceCallout />
                        </motion.div>
                    </main>

                    <Footer />
                    <ThemeToggle theme={theme} setTheme={setTheme} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
